{% extends "resorts/base.html" %}

{% block title %}Удаление бронирования{% endblock %}

{% block content %}
  <div class="card" style="max-width: 760px;">
    <h2 style="margin: 0 0 10px 0;">Удалить бронирование?</h2>
    <p class="muted">
      Тур: <a href="{{ booking.tour.get_absolute_url }}">{{ booking.tour.title }}</a>,
      людей: {{ booking.people_count }},
      итог: {{ booking.total_price|floatformat:0 }} ₽.
    </p>
    <form method="post">
      {% csrf_token %}
      <button class="btn" type="submit">Да, удалить</button>
      <a class="btn" href="{% url 'resorts:my_bookings' %}">Отмена</a>
    </form>
  </div>
{% endblock %}
