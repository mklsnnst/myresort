{% load static %}
{% load resort_tags %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MyResort{% endblock %}</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #0b1220; color: #e8eefc; }
    a { color: #9ecbff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 20px; }
    .nav { display: flex; gap: 12px; align-items: center; justify-content: space-between; padding: 14px 20px; background: rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.10); position: sticky; top: 0; }
    .brand { font-weight: 700; letter-spacing: 0.2px; }
    .pill { display: inline-flex; gap: 10px; align-items: center; padding: 8px 12px; border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; background: rgba(255,255,255,0.06); }
    .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 18px; }
    .card { padding: 16px; border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; background: rgba(255,255,255,0.04); }
    .muted { color: rgba(232,238,252,0.75); }
    .btn { display: inline-block; padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.16); background: rgba(158,203,255,0.10); }
    .btn:hover { background: rgba(158,203,255,0.18); text-decoration: none; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    input, select { padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.14); background: rgba(0,0,0,0.20); color: #e8eefc; }
    label { display: inline-block; margin-bottom: 6px; }
    .pager { display: flex; gap: 10px; align-items: center; justify-content: center; margin-top: 16px; }
    .footer { margin-top: 26px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.10); color: rgba(232,238,252,0.70); font-size: 14px; }
  </style>
</head>
<body>
      <div class="nav">
    <div class="row" style="align-items:center;">
      <a class="brand" href="{% url 'resorts:tour_list' %}">MyResort</a>
      <span class="pill muted">Туры по России</span>
    </div>
    {% include "resorts/_user_block.html" %}
  </div>

  <div class="wrap">
    {% if messages %}
      <div style="margin-bottom: 12px;">
        {% for message in messages %}
          <div class="card">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
    <div class="footer">
      © {% current_year %} MyResort
    </div>
  </div>
</body>
</html>
